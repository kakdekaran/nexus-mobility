services:
  - type: web
    name: nexus-mobility-backend
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.8
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
